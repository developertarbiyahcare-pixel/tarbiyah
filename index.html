    <script>
      tailwind.config = {
        darkMode: 'class',

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        :root {
            --color-primary-light: #10B981; /* emerald-600 */
            --color-primary-dark: #34D399; /* emerald-400 */
            --color-primary-hover-light: #059669; /* emerald-700 */
            --color-primary-hover-dark: #6EE7B7; /* emerald-300 */
            --font-size-base: 95%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile PWA */
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cairo', sans-serif;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        p, .description, .text-description {
            line-height: 1.6;
            opacity: 0.95;
        }

        .font-uthmanic {
            font-family: 'KFGQPC Uthmanic Script HAF', 'Noto Sans Arabic', serif;
            line-height: 2.5;
            direction: rtl;
        }

        .font-amiri {
            font-family: 'Amiri', serif;
            line-height: 2.2;
            direction: rtl;
        }

        .font-scheherazade {
            font-family: 'Scheherazade New', serif;
            line-height: 2.2;
            direction: rtl;
        }

        .font-noto-naskh {
            font-family: 'Noto Naskh Arabic', serif;
            line-height: 2.2;
            direction: rtl;
        }

        .font-lateef {
            font-family: 'Lateef', serif;
            line-height: 2.2;
            direction: rtl;
        }
        
        .bg-primary { background-color: var(--color-primary-light); }
        .dark .bg-primary { background-color: var(--color-primary-dark); }
        .text-primary { color: var(--color-primary-light); }
        .dark .text-primary { color: var(--color-primary-dark); }
        .border-primary { border-color: var(--color-primary-light); }
        .dark .border-primary { border-color: var(--color-primary-dark); }
        .hover\:bg-primary-hover:hover { background-color: var(--color-primary-hover-light); }
        .dark .hover\:bg-primary-hover:hover { background-color: var(--color-primary-hover-dark); }
        .focus\:ring-primary:focus {
             box-shadow: 0 0 0 3px var(--color-primary-light);
        }
        .dark .focus\:ring-primary:focus {
             box-shadow: 0 0 0 3px var(--color-primary-dark);
        }

        html {
            font-size: var(--font-size-base);
            scroll-behavior: smooth;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- ANIMATIONS --- */

        /* Fade In (Existing) */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.7s ease-in-out forwards;
        }

        /* Slide Up */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Scale In */
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scale-in {
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* --- HOVER EFFECTS --- */
        
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }
        
        .hover-scale-subtle {
            transition: transform 0.3s ease;
        }
        .hover-scale-subtle:hover {
            transform: scale(1.02);
        }

        /* Style for currently playing verse highlight */
        .highlight-playing {
            color: var(--color-primary-light);
            transition: color 0.3s ease;
        }
        .dark .highlight-playing {
            color: var(--color-primary-dark);
        }

        .ApplicationTitle {
            text-align: center;
            padding-top: 0.5rem;
            padding-bottom: 1.5rem;
        }

        /* Mood Adaptive UI Styles */
        body.theme-cemas, body.theme-sedih {
            --color-primary-light: #60A5FA; /* blue-400 */
            --color-primary-dark: #93C5FD; /* blue-300 */
            --color-primary-hover-light: #3B82F6; /* blue-500 */
            --color-primary-hover-dark: #BFDBFE; /* blue-200 */
        }
        body.theme-syukur, body.theme-bahagia, body.theme-hopeful {
            --color-primary-light: #FBBF24; /* amber-400 */
            --color-primary-dark: #FCD34D; /* amber-300 */
            --color-primary-hover-light: #F59E0B; /* amber-500 */
            --color-primary-hover-dark: #FDE68A; /* amber-200 */
        }
    </style>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
